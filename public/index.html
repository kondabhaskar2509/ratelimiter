<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Limiter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-8">
    <div class="max-w-xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Rate Limiter</h1>

        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-4">Algorithm:</label>
            <div class="flex gap-6">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="algorithm" value="token-bucket" checked class="w-4 h-4">
                    <span class="text-gray-700">Token Bucket</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="algorithm" value="leaky-bucket" class="w-4 h-4">
                    <span class="text-gray-700">Leaky Bucket</span>
                </label>
            </div>
        </div>

        <button id="sendbutton" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mb-6 transition">
            Send Request
        </button>

        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Responses:</h2>
            <div id="responsesList" class="space-y-2 max-h-96 overflow-y-auto">
                <p class="text-gray-500 text-center">No requests yet</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
